server {
    listen 80;
    listen [::]:80;
    server_name fde.onex.plus;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/fde.onex.plus;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 127.0.0.1:8443 ssl;
    server_name fde.onex.plus;

    root /var/www/fde.onex.plus;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/fde.onex.plus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fde.onex.plus/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico)$ {
        try_files $uri =404;
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
