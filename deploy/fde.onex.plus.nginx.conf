# TLS is first routed by the local SNI stream proxy, so the HTTP layer sees a
# local peer. Keep these global guards deliberately generous; account lockout
# provides the per-account login defense.
limit_req_zone $binary_remote_addr zone=fde_analytics_events:1m rate=3000r/m;
limit_req_zone $binary_remote_addr zone=fde_analytics_login:1m rate=120r/m;
limit_req_zone $binary_remote_addr zone=fde_commercial_apply:1m rate=300r/m;

server {
    listen 80;
    listen [::]:80;
    server_name fde.onex.plus;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/fde.onex.plus;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 127.0.0.1:8443 ssl;
    server_name fde.onex.plus;

    root /var/www/fde.onex.plus;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/fde.onex.plus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fde.onex.plus/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300" always;
        types { }
    }

    location = /llms.txt {
        default_type text/plain;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /34c6fa8d839d4074e38e57038dde09e7.txt {
        default_type text/plain;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /api/analytics/events {
        limit_req zone=fde_analytics_events burst=20 nodelay;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 1s;
        proxy_read_timeout 3s;
        add_header Cache-Control "no-store" always;
    }

    location = /api/commercial/public/training-applications {
        limit_req zone=fde_commercial_apply burst=10 nodelay;
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:8767;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ^~ /api/commercial/ {
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:8767;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /api/network/config {
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ^~ /api/network/public/ {
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ^~ /api/network/ {
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /api/analytics/auth/login {
        limit_req zone=fde_analytics_login burst=4 nodelay;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /api/analytics/ {
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /stats/ {
        try_files $uri $uri/ /stats/index.html;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ^~ /ops/ {
        return 404;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /talents/ {
        try_files /talents/index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location ~ ^/talents/(?:talents\.css|talents\.js|profile\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    location ~ ^/talents/[a-z0-9]+(?:-[a-z0-9]+)*$ {
        return 301 https://$host$uri/;
    }

    location ~ ^/talents/[a-z0-9]+(?:-[a-z0-9]+)*/$ {
        try_files /talents/profile.html =404;
        add_header Cache-Control "no-store" always;
    }

    location ~ ^/talents/ {
        return 404;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico)$ {
        try_files $uri =404;
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
